<svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue 'e' Gradient -->
    <linearGradient id="blue-e-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0CA6F2" />
      <stop offset="30%" stop-color="#0272D4" />
      <stop offset="100%" stop-color="#013A8F" />
    </linearGradient>
    <!-- Yellow Ring Gradient -->
    <linearGradient id="yellow-ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF066" />
      <stop offset="50%" stop-color="#EAA812" />
      <stop offset="100%" stop-color="#A86203" />
    </linearGradient>
  </defs>

  <!-- Golden Ring (Back half, drawn behind the 'e') -->
  <path d="M 6,36 C -2,22 10,6 26,4 C 36,3 42,9 43,15 C 44,21 34,26 24,28" stroke="url(#yellow-ring-grad)" stroke-width="5" stroke-linecap="round" opacity="0.95" />

  <!-- Classic Blue 'e' body -->
  <!-- Outer circle shape and inner cut -->
  <path d="M 40,22 C 40,32 32,40 22,40 C 11,40 4,32 4,22 C 4,11 11,4 22,4 C 32,4 39,11 40,21 L 16,21 C 16,16 19,13 23,13 C 27,13 30,15 31,19 L 40,19 C 39,11 31,8 22,8 C 13,8 8,14 8,22 C 8,30 14,36 22,36 C 30,36 35,31 36,25 L 22,25 L 22,21 L 40,21 Z" fill="url(#blue-e-grad)" stroke="#012C70" stroke-width="1.2" stroke-linejoin="round" />

  <!-- Golden Ring (Front half, drawn in front of the 'e' to loop around it) -->
  <path d="M 43,15 C 45,23 35,32 20,38 C 9,42 -1,38 1,30 C 2,26 8,22 17,19" stroke="url(#yellow-ring-grad)" stroke-width="5.5" stroke-linecap="round" />

  <!-- Highlight overlay for the 'e' -->
  <path d="M 9,18 C 11,11 16,7 22,7 C 27,7 31,9 33,12 C 29,9 23,8 18,12 C 13,16 11,20 11,24" fill="#ffffff" fill-opacity="0.25" />
</svg>
