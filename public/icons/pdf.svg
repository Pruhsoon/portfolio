<svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Paper Gradient -->
    <linearGradient id="paper-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5E6E6" />
    </linearGradient>
    <!-- Folder Tab/Fold Gradient -->
    <linearGradient id="fold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9A3A3" />
    </linearGradient>
  </defs>

  <!-- Main Sheet Body -->
  <path d="M 8,4 L 32,4 L 40,12 L 40,42 C 40,43.5 38.5,44 37,44 L 11,44 C 9.5,44 8,42.5 8,41 Z" fill="url(#paper-grad)" stroke="#A84C4C" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- Folded Page Corner (top right) -->
  <path d="M 32,4 L 32,12 L 40,12 Z" fill="url(#fold-grad)" stroke="#A84C4C" stroke-width="1.5" stroke-linejoin="round" />

  <!-- Mock Text Lines -->
  <!-- Top header line (red in PDF icons) -->
  <line x1="13" y1="16" x2="35" y2="16" stroke="#D12323" stroke-width="2" stroke-linecap="round" />
  <!-- Body lines -->
  <line x1="13" y1="22" x2="35" y2="22" stroke="#8F5E5E" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="27" x2="31" y2="27" stroke="#8F5E5E" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="32" x2="35" y2="32" stroke="#8F5E5E" stroke-width="1.5" stroke-linecap="round" />

  <!-- Little PDF Logo / Stamp in bottom-right -->
  <rect x="25" y="33" width="14" height="8" rx="1" fill="#D12323" stroke="#8A0000" stroke-width="0.5" />
  <text x="32" y="39.5" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
</svg>
