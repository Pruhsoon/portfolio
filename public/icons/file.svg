<svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Paper Gradient -->
    <linearGradient id="paper-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E8E8E1" />
    </linearGradient>
    <!-- Folder Tab/Fold Gradient -->
    <linearGradient id="fold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#C2C2B5" />
    </linearGradient>
  </defs>

  <!-- Main Sheet Body -->
  <path d="M 8,4 L 32,4 L 40,12 L 40,42 C 40,43.5 38.5,44 37,44 L 11,44 C 9.5,44 8,42.5 8,41 Z" fill="url(#paper-grad)" stroke="#7F7F70" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- Folded Page Corner (top right) -->
  <path d="M 32,4 L 32,12 L 40,12 Z" fill="url(#fold-grad)" stroke="#7F7F70" stroke-width="1.5" stroke-linejoin="round" />

  <!-- Mock Text Lines (Classic Notepad style) -->
  <!-- Top header line (often blue in XP text icons) -->
  <line x1="13" y1="16" x2="35" y2="16" stroke="#2B62A2" stroke-width="2" stroke-linecap="round" />
  <!-- Body lines -->
  <line x1="13" y1="22" x2="35" y2="22" stroke="#8A8A7C" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="27" x2="31" y2="27" stroke="#8A8A7C" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="32" x2="35" y2="32" stroke="#8A8A7C" stroke-width="1.5" stroke-linecap="round" />
  <line x1="13" y1="37" x2="25" y2="37" stroke="#8A8A7C" stroke-width="1.5" stroke-linecap="round" />

  <!-- Little Notepad spiral/logo detail or just a small pencil/document stamp -->
  <!-- We'll draw a small page stamp in the bottom right corner: a blue logo -->
  <rect x="29" y="34" width="7" height="6" rx="1" fill="#4B92DB" opacity="0.8" />
  <path d="M 31,37 L 34,37" stroke="#ffffff" stroke-width="1" />
</svg>
