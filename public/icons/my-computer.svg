<svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bezel Gradient -->
    <linearGradient id="bezel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECE9D8" />
      <stop offset="100%" stop-color="#A5A395" />
    </linearGradient>
    <!-- Screen Gradient -->
    <linearGradient id="screen-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A5EA5" />
      <stop offset="100%" stop-color="#2A92E0" />
    </linearGradient>
    <!-- Stand Gradient -->
    <linearGradient id="stand-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C7A6E" />
      <stop offset="50%" stop-color="#C2C0B1" />
      <stop offset="100%" stop-color="#67655B" />
    </linearGradient>
    <!-- Case Gradient -->
    <linearGradient id="case-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#D6D3C4" />
      <stop offset="100%" stop-color="#848276" />
    </linearGradient>
  </defs>

  <!-- CRT Monitor Case (3D Bevel) -->
  <path d="M 6,6 L 38,6 L 38,30 L 6,30 Z" fill="url(#bezel-grad)" stroke="#4A4941" stroke-width="1.5" stroke-linejoin="round" />
  <path d="M 8,8 L 36,8 L 36,28 L 8,28 Z" fill="#3D3C35" />
  
  <!-- Screen -->
  <rect x="10" y="10" width="24" height="16" rx="2" fill="url(#screen-grad)" stroke="#1C1B16" stroke-width="1" />
  <!-- Screen Highlight -->
  <path d="M 11,11 L 33,11 L 11,22 Z" fill="#ffffff" fill-opacity="0.15" />
  <!-- A little desktop content on the screen -->
  <rect x="13" y="13" width="4" height="3" fill="#ffffff" fill-opacity="0.4" />
  <rect x="13" y="18" width="6" height="4" fill="#E8B038" fill-opacity="0.6" />

  <!-- Monitor Stand -->
  <path d="M 18,30 L 26,30 L 27,37 L 17,37 Z" fill="url(#stand-grad)" stroke="#4A4941" stroke-width="1" />
  <!-- Stand Base -->
  <ellipse cx="22" cy="38" rx="8" ry="2.5" fill="url(#bezel-grad)" stroke="#4A4941" stroke-width="1" />

  <!-- CPU Tower (placed slightly behind and to the right) -->
  <path d="M 33,15 L 43,12 L 43,36 L 33,39 Z" fill="url(#case-grad)" stroke="#4A4941" stroke-width="1.2" stroke-linejoin="round" />
  <path d="M 43,12 L 43,36 L 39,37 L 39,14 Z" fill="#67655B" opacity="0.3" />
  <!-- Floppy & CD-ROM Drive Slots -->
  <rect x="35" y="17" width="6" height="1" fill="#4A4941" />
  <rect x="35" y="20" width="6" height="1.5" fill="#4A4941" />
  <!-- Power Button -->
  <circle cx="36" cy="27" r="1" fill="#55B821" stroke="#236005" stroke-width="0.5" />
</svg>
